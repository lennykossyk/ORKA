<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e; font-family: monospace;">

  <!-- Title -->
  <text x="450" y="35" fill="#00ff88" font-size="18" font-weight="bold" text-anchor="middle">ESP32 + TB6612FNG + Motoren + Powerpack</text>

  <!-- ===== POWERPACK ===== -->
  <rect x="20" y="80" width="130" height="180" rx="8" fill="#2d2d44" stroke="#ff6b35" stroke-width="2"/>
  <text x="85" y="105" fill="#ff6b35" font-size="13" font-weight="bold" text-anchor="middle">POWERPACK</text>
  <!-- USB-C Port 1 -->
  <rect x="35" y="120" width="100" height="28" rx="4" fill="#3d3d5c" stroke="#888" stroke-width="1"/>
  <text x="85" y="139" fill="#fff" font-size="11" text-anchor="middle">USB-C (ESP32)</text>
  <!-- USB-A Port -->
  <rect x="35" y="160" width="100" height="28" rx="4" fill="#3d3d5c" stroke="#888" stroke-width="1"/>
  <text x="85" y="179" fill="#fff" font-size="11" text-anchor="middle">USB-A (Motor 5V)</text>
  <!-- Labels -->
  <text x="85" y="220" fill="#aaa" font-size="10" text-anchor="middle">5V / 3A</text>
  <text x="85" y="235" fill="#aaa" font-size="10" text-anchor="middle">gemeinsame GND</text>

  <!-- ===== ESP32 ===== -->
  <rect x="220" y="60" width="140" height="260" rx="8" fill="#2d2d44" stroke="#00aaff" stroke-width="2"/>
  <text x="290" y="85" fill="#00aaff" font-size="13" font-weight="bold" text-anchor="middle">ESP32</text>
  <!-- Pins left side -->
  <text x="232" y="115" fill="#00ff88" font-size="10">3.3V ●</text>
  <text x="232" y="135" fill="#ff4444" font-size="10">GND ●</text>
  <text x="232" y="160" fill="#ffff00" font-size="10">G25 ●</text>
  <text x="232" y="178" fill="#ffff00" font-size="10">G26 ●</text>
  <text x="232" y="196" fill="#ffaa00" font-size="10">G32 ●</text>
  <text x="232" y="220" fill="#ffff00" font-size="10">G27 ●</text>
  <text x="232" y="238" fill="#ffff00" font-size="10">G14 ●</text>
  <text x="232" y="256" fill="#ffaa00" font-size="10">G33 ●</text>
  <!-- USB-C bottom -->
  <rect x="260" y="295" width="60" height="18" rx="3" fill="#3d3d5c" stroke="#888" stroke-width="1"/>
  <text x="290" y="308" fill="#fff" font-size="10" text-anchor="middle">USB-C</text>

  <!-- ===== TB6612FNG ===== -->
  <rect x="450" y="60" width="150" height="280" rx="8" fill="#2d2d44" stroke="#aa44ff" stroke-width="2"/>
  <text x="525" y="85" fill="#aa44ff" font-size="12" font-weight="bold" text-anchor="middle">TB6612FNG</text>
  <!-- Left pins (inputs) -->
  <text x="462" y="115" fill="#00ff88" font-size="10">VCC ●</text>
  <text x="462" y="135" fill="#ff4444" font-size="10">GND ●</text>
  <text x="462" y="158" fill="#ffff00" font-size="10">AIN1 ●</text>
  <text x="462" y="176" fill="#ffff00" font-size="10">AIN2 ●</text>
  <text x="462" y="194" fill="#ffaa00" font-size="10">PWMA ●</text>
  <text x="462" y="218" fill="#ffff00" font-size="10">BIN1 ●</text>
  <text x="462" y="236" fill="#ffff00" font-size="10">BIN2 ●</text>
  <text x="462" y="254" fill="#ffaa00" font-size="10">PWMB ●</text>
  <text x="462" y="278" fill="#ff6b35" font-size="10">STBY ●</text>
  <!-- Right pins (outputs) -->
  <text x="548" y="115" fill="#ff6b35" font-size="10">● VM</text>
  <text x="548" y="135" fill="#ff4444" font-size="10">● GND</text>
  <text x="548" y="175" fill="#00ffff" font-size="10">● AO1</text>
  <text x="548" y="193" fill="#00ffff" font-size="10">● AO2</text>
  <text x="548" y="230" fill="#ff88ff" font-size="10">● BO1</text>
  <text x="548" y="248" fill="#ff88ff" font-size="10">● BO2</text>

  <!-- ===== MOTORS ===== -->
  <!-- Motor A -->
  <rect x="720" y="100" width="120" height="80" rx="8" fill="#2d2d44" stroke="#00ffff" stroke-width="2"/>
  <text x="780" y="128" fill="#00ffff" font-size="12" font-weight="bold" text-anchor="middle">Motor A</text>
  <text x="730" y="155" fill="#00ffff" font-size="10">● A+</text>
  <text x="730" y="170" fill="#00ffff" font-size="10">● A-</text>

  <!-- Motor B -->
  <rect x="720" y="220" width="120" height="80" rx="8" fill="#2d2d44" stroke="#ff88ff" stroke-width="2"/>
  <text x="780" y="248" fill="#ff88ff" font-size="12" font-weight="bold" text-anchor="middle">Motor B</text>
  <text x="730" y="275" fill="#ff88ff" font-size="10">● B+</text>
  <text x="730" y="290" fill="#ff88ff" font-size="10">● B-</text>

  <!-- ===== CONNECTIONS ===== -->

  <!-- Powerpack USB-C → ESP32 USB-C -->
  <line x1="135" y1="134" x2="220" y2="134" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="177" y="128" fill="#888" font-size="9" text-anchor="middle">USB-C</text>

  <!-- Powerpack USB-A → VM (red) -->
  <line x1="135" y1="174" x2="160" y2="174" stroke="#ff6b35" stroke-width="2"/>
  <line x1="160" y1="174" x2="160" y2="50" stroke="#ff6b35" stroke-width="2"/>
  <line x1="160" y1="50" x2="595" y2="50" stroke="#ff6b35" stroke-width="2"/>
  <line x1="595" y1="50" x2="595" y2="110" stroke="#ff6b35" stroke-width="2"/>
  <line x1="595" y1="110" x2="600" y2="110" stroke="#ff6b35" stroke-width="2"/>
  <text x="380" y="45" fill="#ff6b35" font-size="10" text-anchor="middle">5V → VM (rot)</text>

  <!-- Powerpack GND → TB6612 GND (right) -->
  <line x1="135" y1="185" x2="155" y2="185" stroke="#ff4444" stroke-width="2"/>
  <line x1="155" y1="185" x2="155" y2="560" stroke="#ff4444" stroke-width="2"/>
  <line x1="155" y1="560" x2="610" y2="560" stroke="#ff4444" stroke-width="2"/>
  <line x1="610" y1="560" x2="610" y2="130" stroke="#ff4444" stroke-width="2"/>
  <line x1="600" y1="130" x2="610" y2="130" stroke="#ff4444" stroke-width="2"/>
  <text x="380" y="555" fill="#ff4444" font-size="10" text-anchor="middle">GND gemeinsam (schwarz)</text>

  <!-- ESP32 3.3V → TB6612 VCC (green) -->
  <line x1="360" y1="110" x2="410" y2="110" stroke="#00ff88" stroke-width="2"/>
  <line x1="410" y1="110" x2="450" y2="110" stroke="#00ff88" stroke-width="2"/>
  <text x="405" y="105" fill="#00ff88" font-size="9" text-anchor="middle">3.3V</text>

  <!-- ESP32 GND → TB6612 GND (red) -->
  <line x1="360" y1="130" x2="450" y2="130" stroke="#ff4444" stroke-width="2"/>

  <!-- ESP32 G25 → AIN1 -->
  <line x1="360" y1="155" x2="450" y2="155" stroke="#ffff00" stroke-width="1.5"/>
  <!-- ESP32 G26 → AIN2 -->
  <line x1="360" y1="173" x2="450" y2="173" stroke="#ffff00" stroke-width="1.5"/>
  <!-- ESP32 G32 → PWMA -->
  <line x1="360" y1="191" x2="450" y2="191" stroke="#ffaa00" stroke-width="1.5"/>
  <!-- ESP32 G27 → BIN1 -->
  <line x1="360" y1="215" x2="450" y2="215" stroke="#ffff00" stroke-width="1.5"/>
  <!-- ESP32 G14 → BIN2 -->
  <line x1="360" y1="233" x2="450" y2="233" stroke="#ffff00" stroke-width="1.5"/>
  <!-- ESP32 G33 → PWMB -->
  <line x1="360" y1="251" x2="450" y2="251" stroke="#ffaa00" stroke-width="1.5"/>

  <!-- STBY → VCC (green loop) -->
  <line x1="450" y1="273" x2="435" y2="273" stroke="#00ff88" stroke-width="1.5"/>
  <line x1="435" y1="273" x2="435" y2="110" stroke="#00ff88" stroke-width="1.5"/>
  <line x1="435" y1="110" x2="450" y2="110" stroke="#00ff88" stroke-width="1.5"/>
  <text x="425" y="200" fill="#00ff88" font-size="9" text-anchor="middle" transform="rotate(-90, 425, 200)">STBY→VCC</text>

  <!-- AO1 → Motor A+ -->
  <line x1="600" y1="170" x2="660" y2="170" stroke="#00ffff" stroke-width="2"/>
  <line x1="660" y1="170" x2="660" y2="150" stroke="#00ffff" stroke-width="2"/>
  <line x1="660" y1="150" x2="720" y2="150" stroke="#00ffff" stroke-width="2"/>
  <!-- AO2 → Motor A- -->
  <line x1="600" y1="188" x2="670" y2="188" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="670" y1="188" x2="670" y2="165" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="670" y1="165" x2="720" y2="165" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- BO1 → Motor B+ -->
  <line x1="600" y1="225" x2="680" y2="225" stroke="#ff88ff" stroke-width="2"/>
  <line x1="680" y1="225" x2="680" y2="270" stroke="#ff88ff" stroke-width="2"/>
  <line x1="680" y1="270" x2="720" y2="270" stroke="#ff88ff" stroke-width="2"/>
  <!-- BO2 → Motor B- -->
  <line x1="600" y1="243" x2="690" y2="243" stroke="#ff88ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="690" y1="243" x2="690" y2="285" stroke="#ff88ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="690" y1="285" x2="720" y2="285" stroke="#ff88ff" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ===== LEGENDE ===== -->
  <rect x="20" y="420" width="860" height="160" rx="8" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <text x="450" y="445" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">LEGENDE</text>
  
  <line x1="40" y1="465" x2="80" y2="465" stroke="#ff6b35" stroke-width="2"/>
  <text x="90" y="469" fill="#ff6b35" font-size="11">5V Motorstrom (VM)</text>
  
  <line x1="40" y1="485" x2="80" y2="485" stroke="#ff4444" stroke-width="2"/>
  <text x="90" y="489" fill="#ff4444" font-size="11">GND (gemeinsame Masse)</text>
  
  <line x1="40" y1="505" x2="80" y2="505" stroke="#00ff88" stroke-width="2"/>
  <text x="90" y="509" fill="#00ff88" font-size="11">3.3V Logik (VCC + STBY)</text>

  <line x1="300" y1="465" x2="340" y2="465" stroke="#ffff00" stroke-width="1.5"/>
  <text x="350" y="469" fill="#ffff00" font-size="11">Steuerpin (AIN1/2, BIN1/2)</text>

  <line x1="300" y1="485" x2="340" y2="485" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="350" y="489" fill="#ffaa00" font-size="11">PWM Signal (PWMA/B)</text>

  <line x1="300" y1="505" x2="340" y2="505" stroke="#00ffff" stroke-width="2"/>
  <text x="350" y="509" fill="#00ffff" font-size="11">Motor A Ausgänge (AO1/AO2)</text>

  <line x1="300" y1="525" x2="340" y2="525" stroke="#ff88ff" stroke-width="2"/>
  <text x="350" y="529" fill="#ff88ff" font-size="11">Motor B Ausgänge (BO1/BO2)</text>

  <line x1="600" y1="465" x2="640" y2="465" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="650" y="469" fill="#888" font-size="11">USB-C Kabel</text>

  <text x="450" y="565" fill="#aaa" font-size="10" text-anchor="middle">⚠️  USB-A Kabel aufschneiden: Rot → VM,  Schwarz → GND  |  ESP32 + Motoren beide vom Powerpack!</text>

</svg>